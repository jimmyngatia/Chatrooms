{% include 'navbar.html' %}

<div class="form-wrapper">
    <div class="room-card" style="text-align: center; max-width: 500px; border-top: 4px solid var(--primary);">
        <h2 style="margin-bottom: 10px;">Membership Required</h2>
        <p style="color: var(--text-muted); margin-bottom: 25px;">
            You are currently viewing <strong>{{room.name}}</strong>. 
            To view the conversation and participate, you must enroll in this room.
        </p>
        
        <div style="display: flex; gap: 10px; justify-content: center;">
            <a href="{% url 'enroll-room' room.id %}" class="btn btn-primary" style="padding: 15px 30px;">
                Enroll Me Now
            </a>
            <a href="{% url 'home' %}" class="btn btn-danger" style="padding: 15px 30px;">
                Go Back
            </a>
        </div>
    </div>
</div>
